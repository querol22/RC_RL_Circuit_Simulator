<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC/RL Circuit Simulator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <h1>RC / RL Circuit Simulator</h1>
        <p class="subtitle">
            Interactive charging & discharging curves
        </p>

        <!-- ===================== -->
        <!-- TOP GRID (2 COLUMNS) -->
        <!-- ===================== -->
        <div class="top-grid">

            <!-- LEFT COLUMN -->
            <div class="left-column">
                <!-- ===================== -->
                <!-- 1. CIRCUIT TYPE TOGGLE -->
                <!-- ===================== -->
                <div class="section">
                    <h3>1. Circuit Type</h3>
                    <label>Passive Components:</label>
                    <div class="toggle-group">
                        <button id="rcButton">RC Circuit</button>
                        <button id="rlButton">RL Circuit</button>
                        <button id="rlcButton">RLC Circuit</button>
                    </div>
                    
                    <div class="control">
                        <label>Filter Type:</label>
                        <div class="toggle-group">
                            <button id="lowPassButton">Low-pass</button>
                            <button id="highPassButton">High-pass</button>
                            <button id="bandPassButton">Band-pass</button>
                            <button id="notchButton" title="ⓘ Also known as Notch Filter">Band-stop </button>
                        </div>
                    </div>
                </div>
                
                <!-- ===================== -->
                <!-- 2. INPUT CONTROLS -->
                <!-- ===================== -->
                <div class="section">
                    <h3>2. Parameters</h3>

                    <div class="control">
                        <label>Resistance R [Ω]</label>
                        <input type="number" id="resistanceInput" value="1000">
                    </div>

                    <div class="control" id="capacitanceControl">
                        <label>Capacitance C [F]</label>
                        <input type="number" id="capacitanceInput" value="0.001" step="any">
                    </div>

                    <div class="control hidden" id="inductanceControl">
                        <label>Inductance L [H]</label>
                        <input type="number" id="inductanceInput" value="0.01" step="any">
                    </div>

                    <div class="control">
                        <label>Input Voltage V<sub>in</sub> [V]</label>
                        <input type="number" id="voltageInput" value="5" step="any">
                    </div>

                    <div class="control">
                        <label>Mode:</label>
                        <div class="toggle-group">
                            <button id="chargeButton" class="active">Charging</button>
                            <button id="dischargeButton">Discharging</button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="right-column">

                <!-- ===================== -->
                <!-- INFO PANEL -->
                <!-- ===================== -->
                <div class="section">
                    <h3>3. Info</h3>
                    <p id="timeConstantDisplay">Time constant τ: --</p>
                    <p class="formula">
                        <!-- ===================== RC: V(t) = V₀ (1 - e<sup>-t/RC</sup>)  
                        ===================== <br> 
                        ===================== RL: V(t) = V₀ (1 - e<sup>-tR/L</sup>) -->
                    </p>
                </div>

                <!-- ===================== -->
                <!-- Circuit Diagram -->
                <!-- ===================== --> 
                <div class="section">
                    <h3>4. Circuit Diagram</h3>
                    <div id="circuitContainer"></div>
                </div>

            </div>

        </div>

        <!-- ============================== -->
        <!-- BOTTOM GRAPH (Voltage vs Time) -->
        <!-- ============================== -->
        <div class="chart-container">
            <h3>5. Voltage vs Time</h3>
            <canvas id="timeChart"></canvas>
        </div>

        <!-- =================================== -->
        <!-- BOTTOM GRAPH (Voltage vs Frequency) -->
        <!-- =================================== -->
        <div class="chart-container">
            <h3>6. Voltage vs Frequency</h3>
            <canvas id="frequencyChart"></canvas>
        </div>
    </div>

    <!-- ===================== -->
    <!-- JS MODULES -->
    <!-- ===================== -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
